<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Site Under Maintenance</title>

  <style>
    :root {
      --bg: #0d1117;
      --card-bg: #161b22;
      --text: #e6edf3;
      --secondary: #8b949e;
      --accent: #58a6ff;
    }
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
    }
    .card {
      background: var(--card-bg);
      padding: 40px 30px;
      text-align: center;
      border-radius: 14px;
      box-shadow: 0 0 25px rgba(0, 0, 0, 0.4);
      max-width: 420px;
    }
    h1 {
      font-size: 26px;
      margin-bottom: 15px;
      color: var(--accent);
    }
    p {
      font-size: 16px;
      color: var(--secondary);
      margin-bottom: 20px;
    }
    .spinner {
      width: 42px;
      height: 42px;
      border: 4px solid var(--secondary);
      border-top-color: var(--accent);
      border-radius: 50%;
      margin: 0 auto 20px;
      animation: spin 1s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="spinner"></div>
    <h1>We're Making Improvements</h1>
    <p>
      Our site is temporarily unavailable while we roll out new updates.<br>
      Please check back soon.
    </p>
  </div>
</body>
</html>
